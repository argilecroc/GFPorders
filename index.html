<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gluten For Punishment | Menu & Ordering</title>
  <style>
    :root {
      --bg: #0b0a0f;
      --card: #15141d;
      --panel: #111018;
      --border: #26212f;
      --accent: #f6c344;
      --accent-2: #f29c1f;
      --text: #f3efe9;
      --muted: #b9b4a8;
      --pill-bg: #1f2433;
      --pill-text: #f6c344;
      --font-head: "Inter Tight", system-ui, -apple-system, sans-serif;
      --font-body: "Inter", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(242,156,31,0.16), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(246,195,68,0.12), transparent 30%),
        linear-gradient(135deg, #0b0a0f 0%, #0f111b 60%, #0b0a0f 100%);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    header { padding: 48px 24px 24px; max-width: 1080px; margin: 0 auto; }
    .brand-card {
      background: linear-gradient(135deg, rgba(246,195,68,0.92), rgba(242,156,31,0.92));
      color: #0b0a0f;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 16px 50px rgba(0,0,0,0.35);
    }
    .brand { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .brand img { width: 120px; height: auto; border-radius: 12px; background: #0b0a0f; padding: 6px; box-shadow: 0 12px 40px rgba(0,0,0,0.35); object-fit: contain; }
    h1 { margin: 0 0 8px; font-family: var(--font-head); font-weight: 800; letter-spacing: -0.02em; font-size: clamp(32px, 5vw, 46px); color: #0b0a0f; }
    .lead { color: #2f260d; max-width: 720px; font-weight: 600; }
    .cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .btn { padding: 12px 18px; border-radius: 999px; font-weight: 700; border: 1px solid var(--border); background: var(--card); color: var(--text); transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease; }
    .btn.primary { background: linear-gradient(135deg, #0b0a0f, #1b1a22); color: #f6c344; border: 1px solid #0b0a0f; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.25); border-color: #323341; }
    main { max-width: 1080px; margin: 0 auto; padding: 0 24px 64px; display: grid; gap: 32px; }
    section { background: rgba(21,20,29,0.82); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.25); }
    h2 { margin: 0 0 12px; font-family: var(--font-head); letter-spacing: -0.01em; }
    .pill { display: inline-block; padding: 5px 12px; border-radius: 999px; background: var(--pill-bg); color: var(--pill-text); font-size: 13px; border: 1px solid #11121a; }
    .steps { display: grid; gap: 10px; }
    .step { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; }
    .about { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; color: var(--muted); }
    .about strong { color: var(--text); }
    .menu-grid { display: grid; gap: 16px; }
    .category { border: 1px solid var(--border); border-radius: 14px; padding: 14px; background: var(--panel); }
    .category h3 { margin: 0 0 8px; font-family: var(--font-head); color: var(--text); }
    .item { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .item:last-child { border-bottom: none; }
    .item .name { font-weight: 700; }
    .item .unit { color: var(--muted); font-size: 14px; }
    .item .price { font-weight: 700; color: var(--accent); }
    .notes { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .faq { display: grid; gap: 10px; }
    .faq-item { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: var(--panel); }
    footer { color: var(--muted); text-align: center; padding: 24px; font-size: 14px; }
    @media (max-width: 640px) { .item { flex-direction: column; align-items: flex-start; } .cta-row { width: 100%; } .btn { width: auto; } .brand { justify-content: flex-start; } }
  </style>
</head>
